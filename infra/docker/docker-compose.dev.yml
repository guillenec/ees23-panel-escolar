version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ees23-postgres
    environment:
      POSTGRES_DB: ees23
      POSTGRES_USER: ees23
      POSTGRES_PASSWORD: ees23
    ports:
      - "5432:5432"
    volumes:
      - ees23_pg_data:/var/lib/postgresql/data

  backend:
    image: python:3.11-slim
    container_name: ees23-backend
    working_dir: /app
    volumes:
      - ../../backend:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      APP_NAME: EES23 API
      APP_ENV: development
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://ees23:ees23@postgres:5432/ees23
      JWT_SECRET_KEY: change-me-in-docker
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    container_name: ees23-frontend
    working_dir: /app
    volumes:
      - ../../frontend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ees23_pg_data:
